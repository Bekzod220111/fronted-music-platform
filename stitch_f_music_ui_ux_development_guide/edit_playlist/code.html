<script>
    // Micro-interactions for track removal
    document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
      if (icon.textContent === 'close') {
        icon.parentElement.addEventListener('click', function() {
          const row = this.closest('.glass-panel');
          row.style.opacity = '0';
          row.style.transform = 'translateX(20px)';
          setTimeout(() => row.remove(), 300);
        });
      }
    });

    // Handle reorder visual feedback
    const handles = document.querySelectorAll('.track-handle');
    handles.forEach(handle => {
      handle.addEventListener('mousedown', () => {
        handle.closest('.glass-panel').classList.add('ring-2', 'ring-primary/50');
      });
      window.addEventListener('mouseup', () => {
        handle.closest('.glass-panel').classList.remove('ring-2', 'ring-primary/50');
      });
    });
  </script>
